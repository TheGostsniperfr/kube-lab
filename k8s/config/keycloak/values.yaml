replicaCount: 1

production: false

postgresql:
  enabled: true

auth:
  adminUser: "admin"
  adminPassword: "admin"

# externalDatabase:
#   host: "postgres-cluster.postgres.svc.cluster.local"
#   port: 5432
#   database: "keycloak"
#   user: "keycloak"
#   existingSecret: "keycloak-db-secret"
#   existingSecretPasswordKey: "password"
#   existingSecretUserKey: "username"

keycloakConfigCli:
  enabled: false

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    memory: "1Gi"

extraEnvVars:
  # - name: KEYCLOAK_ADMIN
  #   valueFrom:
  #     secretKeyRef:
  #       name: keycloak-admin-secret
  #       key: username
  # - name: KEYCLOAK_ADMIN_PASSWORD
  #   valueFrom:
  #     secretKeyRef:
  #       name: keycloak-admin-secret
  #       key: password
  - name: KC_HOSTNAME
    value: "auth.192.168.1.100.sslip.io"
  - name: KC_PROXY
    value: "edge"
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: "true"
  - name: KC_HTTP_ENABLED
    value: "true"
  - name: KC_HTTP_PORT
    value: "8080"
  - name: KC_LOG_LEVEL
    value: "INFO"
  - name: ROOT_LOGLEVEL
    value: "INFO"
