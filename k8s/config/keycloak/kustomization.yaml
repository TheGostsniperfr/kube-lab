apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak

resources:
  - namespace.yaml
  - secrets.yaml
  - http-route.yaml
  - postgres.yaml

helmCharts:
  - name: keycloakx
    repo: https://codecentric.github.io/helm-charts
    version: "7.1.9"
    releaseName: keycloakx
    namespace: keycloak
    valuesFile: values.yaml
