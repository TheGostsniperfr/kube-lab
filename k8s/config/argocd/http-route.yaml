apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-http-route
  namespace: argocd
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-infra
  hostnames:
    - "argocd.192.168.1.100.sslip.io"
  rules:
    - backendRefs:
        - name: argocd-server
          kind: Service
          port: 80
