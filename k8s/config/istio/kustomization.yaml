apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: istio-system

resources:
  - namespace.yaml

helmCharts:
  - name: base
    repo: https://istio-release.storage.googleapis.com/charts
    version: "1.29.1"
    releaseName: istio-base
    namespace: istio-system
    includeCRDs: true

  - name: istiod
    repo: https://istio-release.storage.googleapis.com/charts
    version: "1.29.1"
    releaseName: istio-istiod
    namespace: istio-system
    valuesFile: istiod-values.yaml
    includeCRDs: true
