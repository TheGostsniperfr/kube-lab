# Values: https://artifacthub.io/packages/helm/istio-official/istiod?modal=values

# This key isn't specify in the default values.yaml, but used in charts templates files (not a big fan of that practice)
# Enable Gateway API support in istiod Doc: https://istio.io/latest/docs/tasks/traffic-management/ingress/ingress-sni-passthrough/

pilot:
  env:
    PILOT_ENABLE_ALPHA_GATEWAY_API: "true"

meshConfig:
  extensionProviders:
    - name: "oauth2-proxy"
      envoyExtAuthzHttp:
        service: "oauth2-proxy.gateway-infra.svc.cluster.local"
        port: 80
        # Headers sent to the oauth2-proxy in the check request.
        includeHeadersInCheck: ["authorization", "cookie"]
        # Headers sent to backend application when request is allowed.
        headersToUpstreamOnAllow:
          [
            "authorization",
            "x-auth-request-user",
            "x-auth-request-email",
            "x-auth-request-access-token",
          ]
        # Headers sent back to the client when request is denied.
        headersToDownstreamOnDeny: ["content-type", "set-cookie"]
