apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-reading-gitlab-secret
  namespace: gateway-infra
spec:
  from:
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: demo-app

    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: demo-app-public
  to:
    - group: ""
      kind: Secret
      name: gitlab-oidc-secret
