apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kyverno

resources:
  - policy/
  - namespace.yaml

helmCharts:
  - name: kyverno
    repo: https://kyverno.github.io/kyverno/
    version: 3.7.1
    releaseName: kyverno
    namespace: kyverno
    valuesFile: values.yaml
    includeCRDs: true
