# Values: https://github.com/kyverno/kyverno/blob/main/charts/kyverno/values.yaml

# HA require at least 3 replicas
admissionController:
  replicas: 3
backgroundController:
  replicas: 3
cleanupController:
  replicas: 3
reportsController:
  replicas: 3

# Necessary in EKS with custom Network CNI plugin
# https://cert-manager.io/docs/installation/compatibility/#aws-eks
# hostNetwork: true

config:
  # Ensure proper resource cleanup and sync status
  # Doc: https://kyverno.io/docs/installation/platform-notes/#notes-for-argocd-users
  preserve: false

  webhooks:
    # Exclude namespaces
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          # Critical Resources
          values:
            - kube-system
            - kyverno
    # Exclude objects
    objectSelector:
      matchExpressions:
        - key: webhooks.kyverno.io/exclude
          operator: DoesNotExist

  # Excluding network bootstrap resources to prevent deadlocks
  # Cf issue: https://blog.zwindler.fr/2026/02/26/kyverno-a-tue-mon-api-server-encore/
  matchConditions:
    - name: "exclude-ServiceCIDR"
      expression: '!(request.kind.kind == "ServiceCIDR")'
    - name: "exclude-IPAddress"
      expression: '!(request.kind.kind == "IPAddress")'
