apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
  project: default
  source:
    repoURL: https://github.com/TheGostsniperfr/kube-lab.git
    targetRevision: feat/envoy-gateway-jwt-claim-based
    path: k8s/config/cert-manager
  destination:
    name: in-cluster
    namespace: cert-manager
